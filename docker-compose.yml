services:
  db:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nickorp}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: nickorp/nickorp-website:latest
    build: .
    command: gunicorn nickorp.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nickorp.rule=Host(`nickorp.com`) || Host(`www.nickorp.com`)"
      - "traefik.http.routers.nickorp.entrypoints=websecure"
      - "traefik.http.routers.nickorp.tls.certresolver=myresolver"
      - "traefik.http.services.nickorp.loadbalancer.server.port=8000"
      - "traefik.http.routers.nickorp-http.rule=Host(`nickorp.com`) || Host(`www.nickorp.com`)"
      - "traefik.http.routers.nickorp-http.entrypoints=web"
      - "traefik.http.routers.nickorp-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

  celery:
    image: nickorp/nickorp-website:latest
    build: .
    command: celery -A nickorp worker -l info
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

networks:
  traefik:
    external: true
    name: n8n-traefik_default

volumes:
  postgres_data:
  static_data:
  media_data:
